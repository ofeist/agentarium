name: agentarium

services:
  registry:
    build: ./registry
    ports:
      - "8000:8000"

  reader-agent:
    build: ./agents/reader-agent
    ports:
      - "8001:8001"

  math-agent:
    build: ./agents/math-agent
    ports:
      - "8002:8002"

  report-writer-agent:
    build: ./agents/report-writer-agent
    ports:
      - "8003:8003"

  orchestrator:
    build: ./orchestrator
    pull_policy: build
    profiles:
      - demo
    depends_on:
      - registry
      - reader-agent
      - math-agent
      - report-writer-agent
    environment:
      REGISTRY_URL: http://registry:8000
      READER_URL: http://reader-agent:8001
      MATH_URL: http://math-agent:8002
      REPORT_WRITER_URL: http://report-writer-agent:8003
